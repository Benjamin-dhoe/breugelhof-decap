maintitel: Waarom kiezen voor Breugelhof?
maintitel_en: Why choose Breugelhof?
mainfeature1titel: Centrale ligging
mainfeature1titel_en: Central location
mainfeature1tekst: Op wandelafstand van universiteiten, winkels, openbaar
  vervoer en horeca. Alles wat je nodig hebt, ligt om de hoek.
mainfeature1tekst_en: Within walking distance of universities, shops, public
  transport, and restaurants. Everything you need is just around the corner.
mainfeature2titel: Volledig gerenoveerd
mainfeature2titel_en: Fully renovated
mainfeature2tekst: Breugelhof werd recent volledig vernieuwd, met aandacht voor
  kwaliteit, licht en ruimte – perfect afgestemd op studenten.
mainfeature2tekst_en: Breugelhof was recently completely renovated, with
  attention to quality, light, and space—perfectly tailored to students.
mainfeature3titel: Gezellige, huiselijke sfeer
mainfeature3titel_en: A cozy, homely atmosphere
mainfeature3tekst: Breugelhof straalt warmte en comfort uit. Dankzij het
  kleinschalige karakter en de sfeervolle inrichting voelt het hier meteen als
  thuiskomen.
mainfeature3tekst_en: Breugelhof radiates warmth and comfort. Thanks to its
  small-scale character and cozy interior design, it immediately feels like
  coming home.
